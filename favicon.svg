<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#020617"/>
  
  <!-- Main circle (CDP logo concept) -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#38bdf8" stroke-width="3"/>
  
  <!-- Inner connected nodes (representing architecture) -->
  <circle cx="50" cy="30" r="6" fill="#38bdf8"/>
  <circle cx="65" cy="50" r="6" fill="#8b5cf6"/>
  <circle cx="50" cy="70" r="6" fill="#f59e0b"/>
  <circle cx="35" cy="50" r="6" fill="#10b981"/>
  
  <!-- Connection lines -->
  <line x1="50" y1="30" x2="65" y2="50" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="50" x2="50" y2="70" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <line x1="50" y1="70" x2="35" y2="50" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="50" x2="50" y2="30" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
</svg>
